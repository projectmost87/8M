<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Día de la Mujer</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
color:white;
background:linear-gradient(135deg,#ff4fa3,#7b2cbf,#ff85c1);
background-size:400% 400%;
animation:fondo 12s infinite;
}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* tarjeta estilo instagram */

.card{

width:350px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
box-shadow:0 20px 60px rgba(0,0,0,0.3);
text-align:center;
animation:entrada 1.5s ease;
}

@keyframes entrada{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
font-size:30px;
margin-bottom:15px;
}

p{
font-size:17px;
line-height:1.5;
}

button{

margin-top:15px;
padding:12px 25px;
border:none;
border-radius:25px;
background:white;
color:#7b2cbf;
font-size:16px;
cursor:pointer;
transition:.3s;

}

button:hover{

transform:scale(1.1);

}

.mensaje{

display:none;
margin-top:15px;
font-size:18px;

}

/* rosas */

.rosa{

position:absolute;
top:-100px;
width:40px;
animation:caer linear;

}

@keyframes caer{

0%{
transform:translateY(-100px) rotate(0deg);
}

100%{
transform:translateY(110vh) rotate(360deg);
}

}

/* brillos */

.spark{

position:absolute;
width:5px;
height:5px;
background:white;
border-radius:50%;
box-shadow:0 0 10px white,0 0 20px white;
animation:brillo 2s infinite;

}

@keyframes brillo{

0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}

}

</style>
</head>

<body>

<audio id="musica" loop>
<source src="musica.mp3">
</audio>

<div class="card">

<h1>🌸 Feliz Día de la Mujer</h1>

<p>
Hoy celebramos tu fuerza, tu valentía y tu capacidad de hacer del mundo un lugar mejor.
</p>

<button onclick="mensaje()">Ver mensaje 💜</button>

<div class="mensaje" id="mensaje">
✨ Nunca olvides lo increíble que eres.  
¡Feliz Día de la Mujer! 🌹
</div>

<button onclick="compartir()">Compartir 📲</button>

</div>

<script>

/* activar musica */

window.addEventListener("click",function(){

document.getElementById("musica").play();

},{once:true});

/* mensaje */

function mensaje(){

document.getElementById("mensaje").style.display="block";

}

/* compartir */

function compartir(){

let texto="🌸 Feliz Día de la Mujer 💜 Mira esta página especial:";

let url=window.location.href;

window.open("https://wa.me/?text="+encodeURIComponent(texto+" "+url));

}

/* lluvia de rosas */

function crearRosa(){

let rosa=document.createElement("img");

rosa.src="https://cdn-icons-png.flaticon.com/512/869/869869.png";

rosa.classList.add("rosa");

rosa.style.left=Math.random()*100+"vw";

rosa.style.animationDuration=(Math.random()*5+5)+"s";

rosa.style.width=(Math.random()*30+30)+"px";

document.body.appendChild(rosa);

setTimeout(()=>{
rosa.remove();
},9000);

}

setInterval(crearRosa,300);

/* brillos */

function crearSpark(){

let s=document.createElement("div");

s.classList.add("spark");

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

document.body.appendChild(s);

setTimeout(()=>{s.remove()},2000);

}

setInterval(crearSpark,150);

</script>

</body>
</html>
