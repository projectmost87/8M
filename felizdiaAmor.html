<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 Marzo</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
color:white;
background:linear-gradient(135deg,#ff4fa3,#7b2cbf,#ff85c1);
background-size:400% 400%;
animation:fondo 12s infinite;
}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* tarjeta estilo Instagram */
.card{
width:350px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
box-shadow:0 20px 60px rgba(0,0,0,0.3);
text-align:center;
animation:entrada 1.5s ease;
}
@keyframes entrada{
from{opacity:0; transform:translateY(50px);}
to{opacity:1; transform:translateY(0);}
}
h1{font-size:30px; margin-bottom:15px;}
p{font-size:17px; line-height:1.5;}
button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:25px;
background:white;
color:#7b2cbf;
font-size:16px;
cursor:pointer;
transition:.3s;
}
button:hover{transform:scale(1.1);}
.mensaje{display:none; margin-top:15px; font-size:18px;}

/* rosas y pétalos */
.flor{ position:absolute; top:-100px; pointer-events:none; animation:caer linear; } @keyframes caer{ 0%{transform:translateY(-100px);} 100%{transform:translateY(110vh);} } /* corazones estilo Instagram sin rotación */ .corazon{ position:absolute; bottom:-20px; font-size:20px; pointer-events:none; animation:flotar 4s linear forwards; } @keyframes flotar{ 0%{transform:translateY(0) scale(1); opacity:1;} 50%{transform:translateY(-200px) scale(1.3); opacity:0.9;} 100%{transform:translateY(-400px) scale(1.6); opacity:0;} }
.foto
  { width:10%; border-radius:10px; margin-bottom:10px; object-fit:cover; }
</style>
</head>
<body>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="card">

<img src="aa.jpeg"class="foto">
<h1>🌸 Feliz Día de la Mujer Mi Amor Hermosa 🌸</h1>

<p>😍 Hoy celebró tu fuerza, tu valentía y tu capacidad de hacer del mundo un lugar mejor, y en especial mi mundo🙏🌏.</p>

<button onclick="mostrarMensaje()">Ver mensaje 💜</button>
<div class="mensaje" id="mensaje">
✨ Nunca olvides lo increíble que eres.  
¡Feliz Día de la Mujer! 🌹
</div>
<br>
<button onclick="compartir()">Compartir 📲</button>
</div>

<script>
/* activar musica al primer clic */
window.addEventListener("click",function(){
  document.getElementById("musica").play();
},{once:true});

/* mostrar mensaje */
function mostrarMensaje(){
  document.getElementById("mensaje").style.display="block";
}

/* compartir WhatsApp */
function compartir(){
  let texto="🌸 Feliz Día de la Mujer 💜 Mira esta página especial:";
  let url=window.location.href;
  window.open("https://wa.me/?text="+encodeURIComponent(texto+" "+url));
}

/* rosas y pétalos */
function crearFlor(){
  let flor=document.createElement("img");
  // URL de rosa/pétalo realista
  flor.src="https://images.vexels.com/media/users/3/147196/isolated/preview/ef9bd0e6f6f0b12e0735846300ae1d0d-ilustracion-de-girasol.png";
  flor.classList.add("flor");
  flor.style.left=Math.random()*100+"vw";
  flor.style.animationDuration=(Math.random()*5+5)+"s";
  flor.style.width=(Math.random()*50+50)+"px";
  document.body.appendChild(flor);
  setTimeout(()=>{flor.remove();},9000);
}
function crearFlor1(){
  let flor=document.createElement("img");
  // URL de rosa/pétalo realista
  flor.src="https://www.pngarts.com/files/6/Rainbow-Butterfly-PNG-Free-Download.png";
  flor.classList.add("flor");
  flor.style.left=Math.random()*100+"vw";
  flor.style.animationDuration=(Math.random()*5+5)+"s";
  flor.style.width=(Math.random()*30+30)+"px";
  document.body.appendChild(flor);
  setTimeout(()=>{flor.remove();},9000);
}
setInterval(crearFlor,250);
setInterval(crearFlor1,250);

/* brillos */
function crearSpark(){
  let s=document.createElement("div");
  s.classList.add("spark");
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  document.body.appendChild(s);
  setTimeout(()=>{s.remove()},2000);
}
setInterval(crearSpark,150);

/* corazones estilo Instagram */
function crearCorazon(){
  let c=document.createElement("div");
  c.classList.add("corazon");
  c.innerHTML="💖";
  c.style.left=Math.random()*100+"vw";
  c.style.fontSize=(Math.random()*20+20)+"px";
  document.body.appendChild(c);
  setTimeout(()=>{c.remove()},4000);
}
setInterval(crearCorazon,500);
</script>
</body>

</html>
